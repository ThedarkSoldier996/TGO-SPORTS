<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSPORTS ARGENTINA HD - MUNDIAL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
    #video-container { width:100vw; height:100vh; }
    video { width:100%; height:100%; object-fit:contain; background:#000; }
</style>
</head>
<body>
<div id="video-container" data-shaka-player-container class="shaka-video-container">
    <video id="video" autoplay playsinline data-shaka-player></video>
</div>

<script>
// === CONFIGURACIÓN ===
const MPD_URL = "https://otte.live.fly.ww.aiv-cdn.net/gru-nitro/live/clients/dash/enc/x0srg3jjpz/out/v1/f779c49314394d61886d63f58d9d52e4/cenc.mpd?dvr_window_length=30";

// Claves decodificadas directamente (evita error atob)
const KEY_ID = "T0w6mRLqdS6I9El4ZKG8iw";
const KEY    = "J4EoAE_oxv-yzSoMFUokGg";

async function initPlayer() {
    try {
        const video = document.getElementById('video');
        const ui = video.ui;
        const player = ui.getControls().getPlayer();

        console.log("🔑 KEY_ID:", KEY_ID);
        console.log("🔑 KEY:", KEY);

        player.configure({
            drm: {
                clearKeys: {
                    [KEY_ID]: KEY
                }
            }
        });

        player.addEventListener('error', (e) => {
            console.error("🚨 Shaka Error:", e.detail);
        });

        console.log("Cargando el stream en vivo...");
        await player.load(MPD_URL);
        
        console.log("✅ ¡Reproducción iniciada correctamente!");

    } catch (error) {
        console.error("❌ Error general:", error);
    }
}

// Iniciar reproductor
document.addEventListener('shaka-ui-loaded', initPlayer);
window.addEventListener('load', () => setTimeout(initPlayer, 1000));
</script>
</body>
</html>
